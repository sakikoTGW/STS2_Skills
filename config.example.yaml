# 复制为 ~/.config/sts2/config.yaml（独立安装）
# Windows: %USERPROFILE%\.config\sts2\config.yaml
# 或使用 Hermes 时合并到 ~/.hermes/config.yaml 的 sts2: 段
#
# 完整说明见 README.md「角色选择」章节

sts2:
  base_url: "http://127.0.0.1:15526"
  timeout: 15
  # 自动代打 / 新局菜单可选角色: ironclad | silent | defect | necrobinder | regent
  # 临时覆盖: STS2_CHARACTER=silent  或  sts2 autoplay start --character silent
  character: ironclad
  commentary: "verbose"
  autoplay: false
  pause_on_ask: true
  ask_user_on:
    - card_reward
    - relic_select
    - relic_select_boss

# 可选: 自定义数据目录（日志、策略、轨迹）
# log_dir: "~/.config/sts2/data"
