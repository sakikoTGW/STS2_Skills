# 复制为 ~/.config/sts2/config.yaml（独立安装）
# Windows: %USERPROFILE%\.config\sts2\config.yaml
# 或使用 Hermes 时合并到 ~/.hermes/config.yaml 的 sts2: 段
#
# 完整说明见 README.md「角色选择」章节

sts2:
  base_url: "http://127.0.0.1:15526"
  timeout: 15
  # 开局角色编号: 0=铁甲战士 1=静默猎手 2=故障机器人 3=亡灵契约师 4=储君
  # 临时覆盖: STS2_CHARACTER=1  或  sts2 autoplay start --character 1
  character: 0
  commentary: "verbose"
  autoplay: false
  pause_on_ask: true
  ask_user_on:
    - card_reward
    - relic_select
    - relic_select_boss
  # 单局最大步数（study / marathon 可能自动抬高）
  # max_steps_per_run: 8000
  # 安全默认：不自动改代码；需要时改为 true
  # auto_repair: false
  # hermes_may_patch_code: false

# 可选: 自定义数据目录（日志、策略、轨迹）
# log_dir: "~/.config/sts2/data"
