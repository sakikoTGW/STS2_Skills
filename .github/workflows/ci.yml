name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev tools
        run: |
          python -m pip install -U pip
          pip install -e ".[mcp,dev]"

      - name: Repo metadata (version alignment)
        run: python tests/test_repo_meta.py

      - name: Ruff (tests + scripts; expand to plugins/sts2 incrementally)
        run: ruff check tests scripts plugins/sts2/version.py plugins/sts2/sts2mcp_install.py plugins/sts2/config.py

      - name: Pytest
        run: pytest

  version-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify synced version files
        shell: pwsh
        run: ./scripts/sync-version.ps1 -Check
